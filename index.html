<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VehicleOC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    main {
      max-width: 720px;
      padding: 32px;

      font-size: 3rem;
      margin-bottom: 0.5rem;

    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #d6dbe3;
    }

      margin-top: 2rem;
      font-size: 0.95rem;
      color: #8f98a8;
    }

<body>
  <main>
    <h1>VehicleOC</h1>
    <h2>Vehicle Operations Center</h2>

    <p>
      A platform for vehicle observability, maintenance tracking,
      telemetry, and lifecycle management.
    </p>

    <p>
      Built for enthusiasts, track-day drivers, shops, and future
      vehicle fleets.
    </p>

    <div class="tagline">
      Coming soon. First development vehicle: 2004 Mercedes-Benz CLK55 AMG.
    </div>
