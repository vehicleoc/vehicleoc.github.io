<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VehicleOC</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #14202a;
      --muted: #5f6b78;
      --blue: #1677ff;
      --dark: #101820;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #ffffff 0%, #eef4ff 45%, #dfe7f2 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    main {
      max-width: 760px;
      padding: 42px 32px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(20, 32, 42, 0.08);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(16, 24, 32, 0.14);
    }

    .logo {
      width: min(420px, 85vw);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
      letter-spacing: -1px;
      color: var(--dark);
    }

    h1 span {
      color: var(--blue);
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.6rem 0 2rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #334150;
    }

    .tagline {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .accent {
      color: var(--blue);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="images/vehicleoc-logo.png" alt="VehicleOC logo" />

    <h1>Vehicle<span>OC</span></h1>
    <h2>Vehicle Operations Center</h2>

    <p>
      A platform for vehicle observability, maintenance tracking,
      telemetry, and lifecycle management.
    </p>

    <p>
      Built for enthusiasts, track-day drivers, shops, and future
      vehicle fleets.
    </p>

    <div class="tagline">
      Coming soon. First development vehicle:
      <span class="accent">2004 Mercedes-Benz CLK55 AMG</span>.
    </div>
  </main>
</body>
</html>
